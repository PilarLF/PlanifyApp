<h2>Gestión de turnos</h2>

<!-- FORMULARIO -->
<form (ngSubmit)="crearHorario()">
  <label>Empleado (ID)</label>
  <input type="number" [(ngModel)]="form.employee_id" name="employee_id" required />

  <label>Inicio</label>
  <input type="datetime-local" [(ngModel)]="form.start_time" name="start_time" required />

  <label>Fin</label>
  <input type="datetime-local" [(ngModel)]="form.end_time" name="end_time" required />

  <button type="submit">Crear turno</button>
</form>

<p *ngIf="mensaje" style="color: green">{{ mensaje }}</p>
<p *ngIf="error" style="color: red">{{ error }}</p>

<hr />

<!-- LISTADO -->
<h3>Turnos existentes</h3>

<table>
  <tr>
    <th>ID</th>
    <th>Empleado</th>
    <th>Inicio</th>
    <th>Fin</th>
    <th>Acciones</th>
  </tr>

  <tr *ngFor="let h of horarios">
    <td>{{ h.id }}</td>
    <td>{{ h.employee_id }}</td>
    <td>{{ h.start_time }}</td>
    <td>{{ h.end_time }}</td>
    <td>
      <button (click)="editar(h)">Editar</button>
      <button (click)="borrar(h.id)">Eliminar</button>
    </td>
  </tr>
</table>

///formulario de edicion: se muestra al seleccionar un turno para editar.
<div *ngIf="editando" class="modal-edicion">
  <h3>Editar turno</h3>

  <label>Inicio</label>
  <input type="datetime-local" [(ngModel)]="editando.start_time" />

  <label>Fin</label>
  <input type="datetime-local" [(ngModel)]="editando.end_time" />

  <button (click)="guardarEdicion()">Guardar</button>
  <button (click)="editando = null">Cancelar</button>
</div>
