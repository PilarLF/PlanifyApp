<h2>Panel de administración</h2>
<div class="admin-header">
  <h1>Panel de administración</h1>
  <p class="subtitle">Gestiona turnos, empleados y horarios</p>
</div>

<!-- FORMULARIO -->
<h3>Crear turno</h3>

<form (ngSubmit)="crearHorario()">
  <label>Empleado</label>
  <select [(ngModel)]="form.employee_id" name="employee_id" required>
    <option value="">Selecciona un empleado</option>
    <option *ngFor="let emp of empleados" [value]="emp.id">
      {{ emp.name }} ({{ emp.email }})
    </option>
  </select>

  <label>Inicio</label>
  <input type="datetime-local" [(ngModel)]="form.start_time" name="start_time" required />

  <label>Fin</label>
  <input type="datetime-local" [(ngModel)]="form.end_time" name="end_time" required />

  <button class="btn-primary" type="submit">Crear turno</button>
</form>

<p *ngIf="mensaje" style="color: green">{{ mensaje }}</p>
<p *ngIf="error" style="color: red">{{ error }}</p>

<hr />

<!-- LISTADO -->
<h3>Turnos existentes</h3>

<table class="turnos-table">
  <tr>
    <th>ID</th>
    <th>Empleado</th>
    <th>Inicio</th>
    <th>Fin</th>
    <th>Acciones</th>
  </tr>

  <tr *ngFor="let h of horarios">
    <td>{{ h.id }}</td>
    <td>{{ h.employee_id }}</td>
    <td>{{ h.start_time }}</td>
    <td>{{ h.end_time }}</td>
    <td>
      <button class="btn-primary" (click)="editar(h)">Editar</button>
      <button class="btn-delete" (click)="borrar(h.id)">Eliminar</button>
    </td>
  </tr>
</table>

<!-- EDICIÓN -->
<div *ngIf="editando" class="modal-edicion">
  <h3>Editar turno</h3>

  <label>Inicio</label>
  <input type="datetime-local" [(ngModel)]="editando.start_time" />

  <label>Fin</label>
  <input type="datetime-local" [(ngModel)]="editando.end_time" />

  <button class="btn-primary" (click)="guardarEdicion()">Guardar</button>
  <button class="btn-small" (click)="editando = null">Cancelar</button>
</div>
